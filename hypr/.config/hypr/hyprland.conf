# --- AUTOSTART ---
exec-once = waybar
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# --- MONITORE ---
monitor=,preferred,auto,1

# --- INPUT (DEUTSCHES LAYOUT) ---
input {
    kb_layout = de
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

# --- LOOK & FEEL ---
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

decoration {
    rounding = 8
    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 5, myBezier
    animation = workspaces, 1, 5, default
}

# --- KEYBINDS ---
$mainMod = SUPER

bind = $mainMod, RETURN, exec, kitty                               # Terminal
bind = $mainMod, E, exec, thunar                              # Dateimanager
bind = $mainMod, D, exec, rofi -show drun                     # App-Launcher
bind = $mainMod, Q, killactive,                               # Fenster schließen
bind = $mainMod, M, exit,                                     # Hyprland beenden (Ausloggen)
bind = $mainMod, F, togglefloating,                           # Fenster schweben lassen

# Fokus wechseln
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Workspaces wechseln (1-5)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# Fenster verschieben (1-5)
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
